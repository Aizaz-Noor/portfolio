<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Aizaz Noor-Portfolio</title>
    <meta name="title" content="Aizaz Noor-Portfolio" />
    <meta name="description" content="Portfolio of Aizaz Noor: BSE student at COMSATS, Aspiring AIOps Engineer, MERN-stack developer, and CLI tool creator. Building scalable AI pipelines from Lahore, Pakistan." />
    <meta name="keywords" content="Aizaz Noor, portfolio, software engineer, AIOps, MERN, React, Node.js, AI, Pakistan" />
    <meta name="author" content="Aizaz Noor" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Aizaz Noor-Portfolio" />
    <meta property="og:description" content="Explore projects, tech stack, certifications, and experience of Aizaz Noor — BSE student building production AI and SaaS tools." />
    <meta property="og:url" content="https://portfolio-seven-opal-48.vercel.app/" />
    <meta property="og:image" content="/profile.jpeg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Aizaz Noor-Portfolio" />
    <meta name="twitter:description" content="Portfolio of Aizaz Noor: MERN dev, AIOps engineer, CLI tool creator." />
    <meta name="twitter:image" content="/profile.jpeg" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Fonts: Inter (body) + Outfit (display) — async non-blocking load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <!-- Load fonts async — media=print trick prevents render-blocking -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;800;900&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet" />
    </noscript>

  </head>
  <body>
    <!-- ═══════════════════════════════════════════════════
         NATIVE PRELOADER — renders instantly before React
         Removed by App.jsx via custom 'app-ready' event
    ═══════════════════════════════════════════════════ -->
    <div id="native-preloader" aria-hidden="true">
      <div class="np-brand">
        <span class="np-name">Aizaz</span><span class="np-accent">Noor</span>
      </div>
      <div class="np-subtitle">
        <span class="np-line"></span>
        <span>Personal Portfolio</span>
        <span class="np-line"></span>
      </div>
      <div class="np-track"><div class="np-fill"></div></div>
    </div>
    <style>
      #native-preloader {
        position: fixed; inset: 0;
        background: #050507;
        z-index: 10000;
        display: flex; flex-direction: column;
        justify-content: center; align-items: center;
        transition: opacity 0.7s ease, visibility 0.7s ease;
        font-family: 'Outfit', -apple-system, sans-serif;
      }
      #native-preloader.np-exit { opacity: 0; visibility: hidden; }
      #native-preloader.np-done { display: none; }
      .np-brand {
        font-size: clamp(2rem, 5vw, 3rem);
        font-weight: 800; letter-spacing: -0.03em;
        margin-bottom: 0.5rem;
        animation: np-up 0.5s ease both;
      }
      .np-name { color: #f1f5f9; }
      .np-accent { color: #818cf8; }
      .np-subtitle {
        display: flex; align-items: center; gap: 1rem;
        font-size: 0.72rem; font-weight: 500;
        letter-spacing: 0.3em; text-transform: uppercase;
        color: rgba(255,255,255,0.3);
        margin-bottom: 2.5rem;
        animation: np-up 0.5s 0.1s ease both;
      }
      .np-line { display: block; height: 1px; width: 28px; background: rgba(255,255,255,0.12); }
      .np-track {
        width: 240px; height: 2px;
        background: rgba(255,255,255,0.08);
        border-radius: 2px; overflow: hidden;
      }
      .np-fill {
        height: 100%;
        background: linear-gradient(90deg, #818cf8, #38bdf8);
        box-shadow: 0 0 10px rgba(129,140,248,0.6);
        border-radius: 2px;
        animation: np-load 1.1s cubic-bezier(0.4,0,0.2,1) forwards;
      }
      @keyframes np-load { from { width: 0%; } to { width: 100%; } }
      @keyframes np-up {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    </style>
    <script>
      // Remove native preloader once React fires the 'app-ready' event
      document.addEventListener('app-ready', function() {
        var el = document.getElementById('native-preloader');
        if (!el) return;
        el.classList.add('np-exit');
        setTimeout(function() { el.classList.add('np-done'); }, 750);
      });
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
