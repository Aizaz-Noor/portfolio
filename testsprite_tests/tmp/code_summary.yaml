version: "2"
type: frontend
tech_stack:
  - React
  - Vite
  - Three.js
  - Web3Forms
routes:
  - path: /
    file: src/App.jsx
    auth_required: false
    description: Main portfolio single page containing all sections
features:
  - name: Submit Contact Form
    description: Send a message to the portfolio owner using Web3Forms
    files:
      - src/pages/Contact.jsx
    entry_route: /
    user_interactions:
      - Fill name input field
      - Fill email input field
      - Fill message textarea field
      - Click Send Message button to submit
      - See success message "✓ Message Delivered!" on successful submission
    api_calls:
      - method: POST
        endpoint: https://api.web3forms.com/submit
    auth_required: false
  - name: View Certifications
    description: View the list of certifications
    files:
      - src/pages/Certifications.jsx
    entry_route: /
    user_interactions:
      - Scroll to Certifications section
      - Hover over a certification card
      - Click "View Credential" link if available
    api_calls: []
    auth_required: false
  - name: View Projects
    description: View open source projects
    files:
      - src/pages/Projects.jsx
    entry_route: /
    user_interactions:
      - Scroll to Projects section
      - Hover over project cards for 3D tilt effect
      - Click "View Code" button
      - Click "Live Demo" button
    api_calls: []
    auth_required: false
known_limitations: []
